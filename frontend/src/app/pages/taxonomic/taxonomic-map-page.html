<header-component />
<main>
    <taxonomic-map (selectTaxonomicNode)="updateTaxonomicCategoryAndDisplayPanel($event)" />
    <div id="taxonomic-details-container" [class.hidden-side-panel]="pickSidePanel() == pickSidePanelEnum.NONE">
        <header>
            <nav>
                <button (click)="displayPresenceParasitePanel()">presencia</button>
                <button (click)="displayTaxonomicCategoryDetailsPanel()">informacion</button>
            </nav>
            <button (click)="closePanel()"><img src="" alt=" close side panel"></button>
        </header>
        <main>
            @if(pickSidePanel() == pickSidePanelEnum.PRESENCE_PARASITES){
            <app-presence-parasites></app-presence-parasites>
            }
            @else if(pickSidePanel() == pickSidePanelEnum.TAXONOMIC_CATEGORY_DETAILS){
            <app-taxonomic-category-details
                [taxonomicCategory]="pickTaxonomicCategory()"></app-taxonomic-category-details>
            }
        </main>
    </div>
</main>
