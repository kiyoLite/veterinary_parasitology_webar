<section [style.grid-template-columns]="getStyleGridColumns()" [style.grid-template-rows]="styleGridRows()">
    @for( currentNode of nodes() ; track currentNode.category.id){
    <taxonomic-node [taxonomicData]="currentNode.category" [gridRow]="currentNode.gridRow"
        [gridColumn]="currentNode.gridColumn" />
    }
</section>
